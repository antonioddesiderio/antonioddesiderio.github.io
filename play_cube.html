<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play with the Cube</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Three.js CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-direction: column;
        }
        #cube-container-play {
            width: 700px;
            height: 700px;
            max-width: 100vw;
            max-height: 80vh;
        }
        .back-nav {
            position: absolute;
            top: 40px;
            left: 40px;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
        }
        .back-nav a {
            text-decoration: none;
            color: #111;
            font-weight: 700;
            padding: 12px 24px;
            border: 2px solid #111;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .back-nav a:hover {
            background-color: #111;
            color: #fff;
        }
        .instructions {
            position: absolute;
            bottom: 60px;
            font-family: 'Inter', sans-serif;
            color: #555;
            text-align: center;
            line-height: 1.8;
            font-size: 1rem;
        }
        .instructions strong {
            color: #111;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="back-nav">
        <a href="index.html">← Back to Site</a>
    </div>

    <div id="cube-container-play"></div>
    
    <div class="instructions">
        <strong>Drag on a piece</strong> to rotate a layer<br>
        <strong>Drag outside</strong> to rotate the camera
    </div>

    <script type="module">
        import { RubiksCube } from './js/cube.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            const cube = new RubiksCube('cube-container-play', true);
            // Always start with a random configuration on this page
            cube.scramble(30); 
        });
    </script>
</body>
</html>
